    <!-- bs-cdn -->
    <link rel="stylesheet" media="screen" href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css" />

<body>
    <div class="container">
        <!-- Nhập thông tin -->
        <div class="row">
            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
                <form>
                    <legend style="font-weight: bold">Quản lý nhân viên</legend>
                    <!-- ID -->
                    <div class="form-group">
                        <label for="">ID: </label>
                        <input type="number" required="true" class="form-control" id="ID_ID" value=""
                            placeholder="Enter Id" />
                    </div>


                    <!-- Email -->
                    <div class="form-group">
                        <label for="">Email: </label>
                        <input type="email" required="true" class="form-control" id="Email_ID" value=""
                            placeholder="Enter Email" />
                    </div>


                    <!-- Username -->
                    <div class="form-group">
                        <label for="">Username: </label>
                        <input type="text" required="true" class="form-control" id="Username_ID" value=""
                            placeholder="Enter Username" />
                    </div>


                    <!-- Fullname -->
                    <div class="form-group">
                        <label for="">Fullname: </label>
                        <input type="text" required="true" class="form-control" id="Fullname_ID" value=""
                            placeholder="Enter Fullname" />
                    </div>


                    <!-- Department -->
                    <div class="form-group">
                        <label for="sel1">Select a Department:</label>
                        <select class="form-control" id="Department_ID">
                            <option>--Select a Department--</option>
                            <option>Accounting</option>
                            <option>Business Development</option>
                            <option>Engineering</option>
                            <option>Human Resources</option>
                            <option>Research and Development</option>
                        </select>
                    </div>


                    <!-- Position -->
                    <div class="form-group">
                        <label for="sel1">Select a Position:</label>
                        <select class="form-control" id="Position_ID">
                            <option>--Select a Position--</option>
                            <option>Developer</option>
                            <option>Tester</option>
                            <option>Scrum Master</option>
                            <option>PM</option>
                        </select>
                    </div>
                    <!-- Cretate Date -->
                    <div class="form-group">
                        <label for="">Cretate Date: </label>
                        <input type="date" required="true" class="form-control" id="Cretate_Date_ID" value="" />
                    </div>


                    <!-- Button -->
                    <div class="form-group">
                        <input type="button" class="btn btn-success" id="save_btn" value="Save" />
                        <input type="button" class="btn btn-warning" id="update_btn" value="Update" />
                        <input type="button" class="btn btn-danger" id="reset_btn" value="Reset" />
                    </div>
                </form>
            </div>
        </div>


        <!-- Hiển thị kết quả -->
        <div class="row">
            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                <table class="table table-hover">
                    <thead>
                        <!-- Tiêu đề -->
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Fullname</th>
                            <th>Department</th>
                            <th>Position</th>
                            <th>Cretate Date</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody id="Result_TB">
