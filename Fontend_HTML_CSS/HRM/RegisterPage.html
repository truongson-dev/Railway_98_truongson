<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <title>Registration Page</title>
  </head>

  <body>
    <div class="container">
      <br />
      <br />
      <br />
      <h2 style="font-weight: bold">Register</h2>
      <br />
      <div class="form-group">
        <label for="">FullName:</label>
        <input type="text" class="form-control" id="Fullname_id" placeholder="Enter FullName" name="FullName" />
      </div>
      <div class="form-group">
        <label for="">Email:</label>
        <input type="Email" class="form-control" id="Email_id" placeholder="Enter Email" name="Email" />
      </div>
      <div class="form-group">
        <label for="">Username:</label>
        <input type="text" class="form-control" id="Username_id" placeholder="Enter Username" />
      </div>
      <div class="form-group">
        <label for="">Password:</label>
        <input type="password" class="form-control" id="Password_id" placeholder="Enter password" name="pwd" />
      </div>
      <div class="form-group">
        <label for="">Confirmation Password:</label>
        <input type="password" class="form-control" id="Re_Password_Id" placeholder="Enter password" name="pwd" />
      </div>

      <input type="button" class="btn btn-primary" value="Register" id="btn_register_id" />

      <input type="button" class="btn btn-info" value="Reset" id="reset_bnt" />
    </div>
    <script type="text/javascript" src="RegisterPage.js"></script>
  </body>
</html>
