            <label for="">Username: </label>
            <input type="text" required="true" class="form-control" id="Username_ID" value=""
              placeholder="Enter Username" />
          </div>

          <!-- Fullname -->
          <div class="form-group">
            <label for="">Fullname: </label>
            <input type="text" required="true" class="form-control" id="Fullname_ID" value=""
              placeholder="Enter Fullname" />
          </div>

          <!-- Department -->
          <div class="form-group">
            <label for="sel1">Select a Department:</label>
            <select class="form-control" id="Department_ID">
              <!-- <option value="0">--Select a Department--</option>

                <option value="Engineering">Engineering</option>
                <option value="Human Resources">Human Resources</option>
                <option value="Research and Development">Research and Development</option> -->
            </select>
          </div>

          <!-- Position -->
          <div class="form-group">
            <label for="sel1">Select a Position:</label>
            <select class="form-control" id="Position_ID">
              /option>
              <!-- <option>PM</option> <option value="0">--Select a Position--</option>
                <option>Developer</option>
                <option>Tester</option>
                <option>Scrum Master< -->
            </select>
          </div>
          <!-- Cretate Date -->
          <div class="form-group">
            <label for="">Cretate Date: </label>
            <input type="date" required="true" class="form-control" id="Cretate_Date_ID" value="" disabled />
          </div>
          <!-- Button -->

          <button type="button" class="btn btn-success" id="save_btn">Save</button>
          <button type="button" class="btn btn-warning" id="update_btn">Update</button>
          <button type="button" class="btn btn-danger" id="reset_btn">Reset</button>
        </form>

      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <!--  -->

        <table class="table table-hover">
          <thead>
            <tr>
              <th style="cursor: pointer;" onclick="changeSort('id')">
                ID
                <i id="sort_id" class="fa fa-fw fa-sort"></i>
              </th>
              <th style="cursor: pointer;" onclick="changeSort('email')">
                Email
                <i id="sort_email" class="fa fa-fw fa-sort"></i>
              </th>
              <th style="cursor: pointer;" onclick="changeSort('username')">

                <i id="sort_username" class="fa fa-fw fa-sort"></i>
              </th>
              <th style="cursor: pointer;" onclick="changeSort('fullname')">
                Fullname
                <i id="sort_fullname" class="fa fa-fw fa-sort"></i>
              </th>
              <th style="cursor: pointer;" onclick="changeSort('department.name')">
                Department
                <i id="sort_department.name" class="fa fa-fw fa-sort"></i>
              </th>
              <th style="cursor: pointer;" onclick="changeSort('position.name')">
                Position
                <i id="sort_position.name" class="fa fa-fw fa-sort"></i>
              </th>
              <th style="cursor: pointer;" onclick="changeSort('createDate')">
                Cretate Date
                <i id="sort_createDate" class="fa fa-fw fa-sort"></i>
              </th>
              <th>Edit</th>
