<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hrm Page</title>

    <!-- Latest compiled and minified CSS & JS -->
    <link
      rel="stylesheet"
      media="screen"
      href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css"
    />
    <script src="//code.jquery.com/jquery.js"></script>
    <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
  </head>

  <body>
    <div class="container">
      <!-- Nhập liệu -->

      <div class="row">
        <div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
          <!--  -->

          <form>
            <legend>Quản lý Nhân viên</legend>
            <!-- ID -->
            <div class="form-group">
              <label for="">Id</label>
              <input
                type="number"
                class="form-control"
                id="ID_ID"
                placeholder="Input Id"
                disabled
              />
            </div>

            <!-- Email -->
            <div class="form-group">
              <label for="">Email</label>
              <input
                type="email"
                class="form-control"
                id="Email_ID"
                placeholder="Input Email"
              />
            </div>

            <!-- Username -->
            <div class="form-group">
              <label for="">Username: </label>
              <input
                type="text"
                required="true"
                class="form-control"
                id="Username_ID"
                value=""
                placeholder="Enter Username"
              />
            </div>

            <!-- Fullname -->
            <div class="form-group">
              <label for="">Fullname: </label>
              <input
                type="text"
                required="true"
                class="form-control"
                id="Fullname_ID"
                value=""
                placeholder="Enter Fullname"
              />
            </div>

            <!-- Department -->
            <div class="form-group">
              <label for="sel1">Select a Department:</label>
              <select class="form-control" id="Department_ID">
                <!-- <option value="0">--Select a Department--</option>
                <option value="Accounting">Accounting</option>
                <option value="Business Development">Business Development</option>
                <option value="Engineering">Engineering</option>
                <option value="Human Resources">Human Resources</option>
                <option value="Research and Development">Research and Development</option> -->
              </select>
            </div>

            <!-- Position -->
            <div class="form-group">
              <label for="sel1">Select a Position:</label>
              <select class="form-control" id="Position_ID">
                <!-- <option value="0">--Select a Position--</option>
                <option>Developer</option>
                <option>Tester</option>
                <option>Scrum Master</option>
                <option>PM</option> -->
              </select>
            </div>
            <!-- Cretate Date -->
            <div class="form-group">
              <label for="">Cretate Date: </label>
              <input
                type="date"
                required="true"
                class="form-control"
                id="Cretate_Date_ID"
                value=""
                disabled
              />
            </div>
            <!-- Button -->

            <button type="button" class="btn btn-success" id="save_btn">
              Save
            </button>
            <button type="button" class="btn btn-warning" id="update_btn">
              Update
            </button>
            <button type="button" class="btn btn-danger" id="reset_btn">
              Reset
            </button>
          </form>
        </div>
      </div>

      <!-- Hiển thị kết quả -->

      <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
          <!--  -->

          <table class="table table-hover">
            <thead>
              <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Username</th>
                <th>Fullname</th>
                <th>Department</th>
                <th>Position</th>
                <th>Cretate Date</th>
                <th>Edit</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody id="Result_TB">
              <!-- <tr>
                <td>1</td>
                <td>daonq@gmail.com</td>
                <td>daonq</td>
                <td>Nguyễn Đạo</td>
                <td>BOD</td>
                <td>Dev</td>
                <td>05-03-2026</td>
                <td>
                  <button type="button" class="btn btn-warning">Edit</button>
                </td>
                <td>
                  <button type="button" class="btn btn-danger">Delete</button>
                </td>
              </tr> -->
              <!-- -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <!-- Phân trang -->

      <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
          <ul class="pagination" id="pagination_Id">
            <!-- <li class="page-item"><a class="page-link" href="#">Previous</a></li>

    </div>
