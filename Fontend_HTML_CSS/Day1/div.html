<!doctype html>
<html>
  <head>
    <title>Register</title>
  </head>
  <body>
    <div>
      <h1>Register</h1>
      <i>Please <b>fill in this form</b> to create an account</i>
    </div>

    <br />

    <form>
      <div>
        <label>Full name <span>*</span></label
        ><br />
        <input type="text" placeholder="Input your fullname..." size="30" />
      </div>

      <br />

      <div>
        <label>Username <span>*</span></label
        ><br />
        <input type="text" placeholder="Input your username..." size="30" />
      </div>

      <br />

      <div>
        <label>Password <span>*</span></label
        ><br />
        <input type="password" placeholder="Input your password..." size="30" />
      </div>

      <br />

      <div>
        <label>Email <span>*</span></label
        ><br />
        <input type="email" placeholder="Input your email..." size="30" />
      </div>

      <br />

      <div>
        <label>Telephone number <span>*</span></label
        ><br />
        <input type="text" placeholder="Input your phone number..." size="30" />
      </div>

      <br />

      <div>
        <label>Input Object:</label><br />
        <span> <input type="radio" name="role" /> Student </span>
        <span> <input type="radio" name="role" /> Teacher </span>
      </div>

      <br />

      <div>
        <label>Favorite :</label><br />
        <span><input type="checkbox" /> Badminton</span>
        <span><input type="checkbox" /> Volleyball</span>
        <span><input type="checkbox" /> Football</span>
      </div>

      <br />

      <div>
        <label>Address <span>*</span></label
        ><br />
        <select>
          <option>Bắc Giang</option>
          <option>Hà Nội</option>
          <option>Đà Nẵng</option>
          <option>Hồ Chí Minh</option>
        </select>
      </div>

      <br />

      <div>
        <label>Birthday <span>*</span></label
        ><br />
        <input type="date" />
      </div>

      <br />

      <div>
        <label>Your picture <span>*</span></label
        ><br />
        <input type="file" />
      </div>

      <br />

      <div>
        <input type="submit" value="Đăng ký" />
      </div>
    </form>
  </body>
</html>
