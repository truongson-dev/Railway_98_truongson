<!doctype html>
<html>
  <head>
    <title>Register</title>
  </head>
  <body>
    <h1>Register</h1>
    <i>Please <b>fill in this form</b> to create an account</i>
    <br /><br />

    <form>
      <label>Full name <font color="red">*</font></label
      ><br />
      <input type="text" placeholder="Input your fullname..." size="30" />
      <br /><br />

      <label>Username <font color="red">*</font></label
      ><br />
      <input type="text" placeholder="Input your username..." size="30" />
      <br /><br />

      <label>Password <font color="red">*</font></label
      ><br />
      <input type="password" placeholder="Input your password..." size="30" />
      <br /><br />

      <label>Email <font color="red">*</font></label
      ><br />
      <input type="email" placeholder="Input your email..." size="30" />
      <br /><br />

      <label>Telephone number <font color="red">*</font></label
      ><br />
      <input type="text" placeholder="Input your phone number..." size="30" />
      <br /><br />

      <label>Input Object:</label><br />
      <input type="radio" name="role" /> Student
      <input type="radio" name="role" /> Teacher <br /><br />

      <label>Favorite :</label><br />
      <input type="checkbox" /> Badminton <input type="checkbox" /> Volleyball
      <input type="checkbox" /> Football <br /><br />

      <label>Address <font color="red">*</font></label
      ><br />
      <select>
        <option>Bắc Giang</option>
        <option>Hà Nội</option>
        <option>Đà Nẵng</option>
        <option>Hồ Chí Minh</option>
      </select>
      <br /><br />

      <label>Birthday <font color="red">*</font></label
      ><br />
      <input type="date" />
      <br /><br />

      <label>Your picture <font color="red">*</font></label
      ><br />
      <input type="file" />
      <br /><br />

      <input type="submit" value="Đăng ký" />
    </form>
  </body>
</html>
